spring:
  application:
    name: pueria

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/pueria_dev}
    username: ${SPRING_DATASOURCE_USERNAME:pueria}
    password: ${SPRING_DATASOURCE_PASSWORD:pueria}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: ${PUERIA_HIBERNATE_FORMAT_SQL:true}

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

seguranca:
  jwt:
    secret: ${PUERIA_JWT_SECRET:pueria-dev-secret-altere-este-valor-em-producao-256-bits}
    expiracao-segundos: ${PUERIA_JWT_EXPIRACAO_SEGUNDOS:3600}

pueria:
  cors:
    allowed-origins: ${PUERIA_CORS_ALLOWED_ORIGINS:http://localhost:4200}
  frontend-url: ${PUERIA_FRONTEND_URL:http://localhost:4200}
  email:
    habilitado: ${PUERIA_EMAIL_HABILITADO:false}
    remetente: ${PUERIA_EMAIL_REMETENTE:nao-responda@pueria.com.br}
  redefinicao-senha:
    expiracao-minutos: ${PUERIA_REDEFINICAO_SENHA_EXPIRACAO_MINUTOS:15}
  rate-limit:
    habilitado: ${PUERIA_RATE_LIMIT_HABILITADO:true}
    confiar-cabecalhos-encaminhados: ${PUERIA_RATE_LIMIT_CONFIAR_CABECALHOS_ENCAMINHADOS:false}
