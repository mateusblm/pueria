spring:
  datasource:
    url: jdbc:h2:mem:pueria_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: false

seguranca:
  jwt:
    secret: pueria-test-secret-com-tamanho-suficiente-para-hmac-sha256
    expiracao-segundos: 3600
