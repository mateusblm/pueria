spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/pueria_test
    username: pueria
    password: pueria
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true

seguranca:
  jwt:
    secret: pueria-integration-secret-com-tamanho-suficiente-para-hmac-sha256
    expiracao-segundos: 3600

pueria:
  rate-limit:
    habilitado: false
