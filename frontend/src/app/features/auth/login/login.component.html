<div class="auth-form">
  <div>
    <p class="pueria-eyebrow">Acesso</p>
    <h2>Entre na sua conta</h2>
    <p>Continue os registros e observações que ajudam a acompanhar cada fase da criança.</p>
  </div>

  @if (erro()) {
    <div class="pueria-message pueria-message--erro">{{ erro() }}</div>
  }

  <form class="pueria-form" [formGroup]="form" (ngSubmit)="entrar()">
    <div class="pueria-field">
      <label for="email">E-mail</label>
      <input id="email" type="email" autocomplete="email" formControlName="email" />
    </div>

    <div class="pueria-field">
      <label for="senha">Senha</label>
      <div class="auth-password">
        <input
          id="senha"
          [type]="senhaVisivel() ? 'text' : 'password'"
          autocomplete="current-password"
          formControlName="senha"
        />
        <button
          type="button"
          class="auth-password__toggle"
          [attr.aria-label]="senhaVisivel() ? 'Ocultar senha' : 'Mostrar senha'"
          (click)="alternarSenha()"
        >
          <app-icon [name]="senhaVisivel() ? 'eyeOff' : 'eye'" [size]="19" />
        </button>
      </div>
      <a class="auth-form__forgot" routerLink="/recuperar-senha">Esqueci minha senha</a>
    </div>

    <button class="pueria-button" type="submit" [disabled]="carregando()">
      {{ carregando() ? 'Entrando...' : 'Entrar' }}
    </button>
  </form>

  <p class="auth-form__link">
    Ainda não tem conta?
    <a routerLink="/cadastro">Criar cadastro</a>
  </p>
  <p class="auth-form__privacy"><a href="/privacidade" data-privacy-modal>Aviso de Privacidade</a></p>
  <a class="auth-form__inicio" routerLink="/">Voltar à página inicial</a>
</div>
