<div class="auth-form">
  <div>
    <p class="pueria-eyebrow">Cadastro</p>
    <h2>Crie sua conta</h2>
    <p>Crie seu acesso para acompanhar o desenvolvimento, a rotina e os registros da criança em um só lugar.</p>
  </div>

  @if (erro) {
    <div class="pueria-message pueria-message--erro">{{ erro }}</div>
  }

  <form class="pueria-form" [formGroup]="form" (ngSubmit)="cadastrar()">
    <div class="pueria-field">
      <label for="nome">Nome</label>
      <input id="nome" type="text" autocomplete="name" formControlName="nome" />
    </div>

    <div class="pueria-field">
      <label for="email">E-mail</label>
      <input id="email" type="email" autocomplete="email" formControlName="email" />
    </div>

    <div class="pueria-field">
      <label for="senha">Senha</label>
      <div class="auth-password">
        <input
          id="senha"
          [type]="senhaVisivel ? 'text' : 'password'"
          autocomplete="new-password"
          formControlName="senha"
        />
        <button
          type="button"
          class="auth-password__toggle"
          [attr.aria-label]="senhaVisivel ? 'Ocultar senha' : 'Mostrar senha'"
          (click)="alternarSenha()"
        >
          <span class="auth-password__eye" aria-hidden="true"></span>
        </button>
      </div>
    </div>

    <div class="pueria-field">
      <label for="confirmarSenha">Repita a senha</label>
      <div class="auth-password">
        <input
          id="confirmarSenha"
          [type]="confirmarSenhaVisivel ? 'text' : 'password'"
          autocomplete="new-password"
          formControlName="confirmarSenha"
        />
        <button
          type="button"
          class="auth-password__toggle"
          [attr.aria-label]="confirmarSenhaVisivel ? 'Ocultar senha' : 'Mostrar senha'"
          (click)="alternarConfirmarSenha()"
        >
          <span class="auth-password__eye" aria-hidden="true"></span>
        </button>
      </div>
    </div>

    <button class="pueria-button" type="submit" [disabled]="carregando">
      {{ carregando ? 'Criando...' : 'Criar conta' }}
    </button>
  </form>

  <p class="auth-form__link">
    Já tem conta?
    <a routerLink="/login">Entrar</a>
  </p>
</div>
