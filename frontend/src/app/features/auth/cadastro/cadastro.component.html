<div class="auth-form">
  <div>
    <p class="pueria-eyebrow">Cadastro</p>
    <h2>Crie sua conta</h2>
    <p>O cadastro inicial é para responsáveis. Perfis profissionais entram em uma etapa posterior.</p>
  </div>

  @if (erro) {
    <div class="pueria-message pueria-message--erro">{{ erro }}</div>
  }

  <form class="pueria-form" [formGroup]="form" (ngSubmit)="cadastrar()">
    <div class="pueria-field">
      <label for="nome">Nome</label>
      <input id="nome" type="text" autocomplete="name" formControlName="nome" />
    </div>

    <div class="pueria-field">
      <label for="email">E-mail</label>
      <input id="email" type="email" autocomplete="email" formControlName="email" />
    </div>

    <div class="pueria-field">
      <label for="senha">Senha</label>
      <input id="senha" type="password" autocomplete="new-password" formControlName="senha" />
    </div>

    <button class="pueria-button" type="submit" [disabled]="carregando">
      {{ carregando ? 'Criando...' : 'Criar conta' }}
    </button>
  </form>

  <p class="auth-form__link">
    Já tem conta?
    <a routerLink="/login">Entrar</a>
  </p>
</div>
