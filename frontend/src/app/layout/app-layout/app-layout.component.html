<div class="app-shell">
  <header class="app-shell__topbar">
    <app-brand-mark></app-brand-mark>
    <button type="button" class="app-shell__menu-button" (click)="abrirMenu()" aria-label="Abrir menu">
      ☰
    </button>
  </header>

  @if (menuAberto) {
    <button type="button" class="app-shell__overlay" aria-label="Fechar menu" (click)="fecharMenu()"></button>
  }

  <aside class="app-shell__sidebar" [class.app-shell__sidebar--open]="menuAberto">
    <div class="app-shell__sidebar-head">
      <app-brand-mark></app-brand-mark>
      <button type="button" class="app-shell__close" (click)="fecharMenu()" aria-label="Fechar menu">×</button>
    </div>

    <nav class="app-shell__nav" aria-label="Navegação principal">
      <a routerLink="/acompanhamento" routerLinkActive="ativo" (click)="fecharMenu()">
        <span>◷</span>
        Acompanhamento
      </a>
      <a routerLink="/criancas" routerLinkActive="ativo" [routerLinkActiveOptions]="{ exact: true }" (click)="fecharMenu()">
        <span>⌂</span>
        Minha criança
      </a>
    </nav>

    <button type="button" class="app-shell__logout" (click)="sair()">
      Sair da conta
    </button>
  </aside>

  <main class="app-shell__content">
    <router-outlet></router-outlet>
  </main>
</div>
