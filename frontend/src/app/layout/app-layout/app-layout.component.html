<div class="app-shell">
  <header class="app-shell__topbar">
    <app-brand-mark></app-brand-mark>
    <button type="button" class="app-shell__menu-button" (click)="abrirMenu()" aria-label="Abrir menu" title="Abrir menu">
      <app-icon name="menu" [size]="20" />
    </button>
  </header>

  @if (menuAberto) {
    <button type="button" class="app-shell__overlay" aria-label="Fechar menu" (click)="fecharMenu()"></button>
  }

  <aside class="app-shell__sidebar" [class.app-shell__sidebar--open]="menuAberto">
    <div class="app-shell__sidebar-head">
      <app-brand-mark></app-brand-mark>
      <button type="button" class="app-shell__close" (click)="fecharMenu()" aria-label="Fechar menu"><app-icon name="close" [size]="21" /></button>
    </div>

    <nav class="app-shell__nav" aria-label="Navegação principal">
      <a routerLink="/acompanhamento" routerLinkActive="ativo" [routerLinkActiveOptions]="{ exact: true }" (click)="fecharMenu()">
        <app-icon name="home" [size]="20" />
        Início
      </a>
      <button type="button" (click)="irParaMarcos()" [class.ativo]="marcosEstaAtivo()">
        <app-icon name="brain" [size]="20" />
        Marcos
      </button>
      <button type="button" (click)="irParaAcompanhamento()" [class.ativo]="acompanhamentoEstaAtivo()">
        <app-icon name="message" [size]="20" />
        Acompanhamento
      </button>
      <button type="button" (click)="irParaConsulta()" [class.ativo]="consultaEstaAtiva()">
        <app-icon name="stethoscope" [size]="20" />
        Para a consulta
      </button>
    </nav>

    <button type="button" class="app-shell__logout" (click)="sair()">
      <app-icon name="logout" [size]="19" />
      Sair da conta
    </button>
  </aside>

  <main class="app-shell__content">
    <router-outlet></router-outlet>
  </main>

  <nav class="app-shell__mobile-nav" aria-label="Navegação principal">
    <a routerLink="/acompanhamento" routerLinkActive="ativo" title="Início">
      <app-icon name="home" [size]="18" />
      <span>Início</span>
    </a>
    <button type="button" (click)="irParaMarcos()" [class.ativo]="marcosEstaAtivo()" title="Marcos"><app-icon name="brain" [size]="18" /><span>Marcos</span></button>
    <button type="button" (click)="irParaAcompanhamento()" [class.ativo]="acompanhamentoEstaAtivo()" title="Acompanhamento"><app-icon name="message" [size]="18" /><span>Acompanhar</span></button>
    <button type="button" (click)="irParaConsulta()" [class.ativo]="consultaEstaAtiva()" title="Para a consulta">
      <app-icon name="stethoscope" [size]="18" />
      <span>Consulta</span>
    </button>
  </nav>
</div>
